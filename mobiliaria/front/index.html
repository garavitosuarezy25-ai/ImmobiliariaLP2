<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Docentes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-2 bg-dark text-white min-vh-100 p-3">
            <h4><i class="bi bi-building"></i> Sistema Escolar</h4>
            <hr>
            <ul class="nav flex-column">

                <li>
                    <a href="index.html" class="nav-link text-white">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>

                <li>
                    <a href="docentes/docentes.html" class="nav-link text-white">
                        <i class="bi bi-person"></i> Docentes
                    </a>
                </li>

            </ul>
        </div>

        <div class="col-10 p-4">
            <h2>Dashboard</h2>

            <div class="row mt-4">

                <div class="col-md-4">
                    <div class="card text-bg-primary">
                        <div class="card-body">
                            <h5>
                                <i class="bi bi-person"></i> Total de Docentes
                            </h5>
                            <h3 id="totalDocentes">0</h3>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="api.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    try {

        const response = await fetch(API.docentes);

        if (!response.ok) {
            throw new Error("No se pudieron cargar los docentes");
        }

        const docentes = await response.json();

        document.getElementById("totalDocentes").innerText = docentes.length;

    } catch (error) {

        console.error(error);
        document.getElementById("totalDocentes").innerText = "Error";

    }
});
</script>

</body>
</html>
