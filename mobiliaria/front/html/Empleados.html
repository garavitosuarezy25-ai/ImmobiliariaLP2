<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Empleados</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-2 sidebar p-3">
            <h4><i class="bi bi-building"></i> Empleados</h4>
            <hr>
            <ul class="nav flex-column">
                <li>
                    <a href="../index.html" class="nav-link text-white">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a href="empleados.html" class="nav-link text-white">
                        <i class="bi bi-person"></i> Empleados
                    </a>
                </li>
            </ul>
        </div>

        <!-- Contenido -->
        <div class="col-10 p-4">

            <h2><i class="bi bi-person"></i> Gestión de Empleados</h2>

            <form id="formEmpleado" class="mb-3">

                <input type="number" id="idEmpleado"
                       class="form-control mb-2"
                       placeholder="ID del empleado"
                       required>

                <input type="text" id="nombre"
                       class="form-control mb-2"
                       placeholder="Nombre"
                       required>

                <input type="text" id="apellido"
                       class="form-control mb-2"
                       placeholder="Apellido"
                       required>

                <input type="date" id="fechaNacimiento"
                       class="form-control mb-2">

                <input type="text" id="domicilio"
                       class="form-control mb-2"
                       placeholder="Domicilio">

                <input type="text" id="telefono"
                       class="form-control mb-2"
                       placeholder="Teléfono">

                <input type="email" id="correo"
                       class="form-control mb-2"
                       placeholder="Correo">

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Guardar
                </button>
            </form>

            <!-- Tabla -->
            <table class="table table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Fecha Nacimiento</th>
                        <th>Domicilio</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaEmpleados"></tbody>
            </table>

        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/empleados.js"></script>
</body>
</html>
