<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Docentes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-2 bg-dark text-white min-vh-100 p-3">
            <h4><i class="bi bi-building"></i> Docentes </h4>
            <hr>
            <ul class="nav flex-column">
                <li>
                    <a href="../index.html" class="nav-link text-white">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a href="docentes.html" class="nav-link text-white">
                        <i class="bi bi-person"></i> Docentes
                    </a>
                </li>
            </ul>
        </div>

        <div class="col-10 p-4">

            <h2><i class="bi bi-person"></i> Gestión de Docentes</h2>

            <form id="formDocente" class="mb-3">

                <input type="number" id="docenteId"
                       class="form-control mb-2"
                       placeholder="ID del docente"
                       required>

                <select id="tipoDocumento" class="form-control mb-2" required>
                    <option value="">Tipo de documento</option>
                    <option value="CC">CC</option>
                    <option value="CE">CE</option>
                    <option value="TI">TI</option>
                    <option value="NIUP">NIUP</option>
                </select>

                <input type="text" id="nombre"
                       class="form-control mb-2"
                       placeholder="Nombre"
                       required>

                <input type="text" id="apellido"
                       class="form-control mb-2"
                       placeholder="Apellido"
                       required>

                <input type="date" id="fechaNacimiento" class="form-control mb-2" required>

                <select id="nivelEstudios" class="form-control mb-2" required>
                    <option value="">Nivel de estudios</option>
                    <option value="PREGRADO">PREGRADO</option>
                    <option value="MAESTRIA">MAESTRIA</option>
                    <option value="DOCTORADO">DOCTORADO</option>
                </select>

                <select id="area" class="form-control mb-2" required>
                    <option value="">Área</option>
                    <option value="MATEMATICAS">MATEMATICAS</option>
                    <option value="CIENCIAS">CIENCIAS</option>
                    <option value="SISTEMAS">SISTEMAS</option>
                </select>

                <select id="grado" class="form-control mb-2" required>
                    <option value="">Semestre</option>
                    <option value="PRIMER SEMESTRE">PRIMER SEMESTRE</option>
                    <option value="SEGUNDO SEMESTRE">SEGUNDO SEMESTRE</option>
                    <option value="TERCER SEMESTRE">TERCER SEMESTRE</option>
                    <option value="CUARTO SEMESTRE">CUARTO SEMESTRE</option>
                </select>

                <input type="text" id="eps"
                    class="form-control mb-2"
                    placeholder="EPS"
                    required>

                <input type="number" id="salario"
                       class="form-control mb-2"
                       placeholder="Salario"
                       required>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Guardar
                </button>
            </form>

            <table class="table table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Documento</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Fecha Nacimiento</th>
                        <th>Nivel Estudios</th>
                        <th>Área</th>
                        <th>Grado</th>
                        <th>EPS</th>
                        <th>Salario</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaDocentes"></tbody>
            </table>

        </div>
    </div>
</div>

<script src="../api.js"></script>
<script src="docentes.js"></script>
</body>
</html>
